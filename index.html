<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fresh Jobs Link</title>
<meta name="description" content="Generate LinkedIn job search links filtered by post age, sorted newest-first.">
<meta name="theme-color" content="#e2f24a">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --background: oklch(0.985 0.006 110);
    --foreground: oklch(0.21 0.02 130);
    --card: oklch(1 0 0);
    --primary: oklch(0.86 0.21 115);
    --primary-foreground: oklch(0.24 0.05 125);
    --muted-foreground: oklch(0.5 0.02 125);
    --border: oklch(0.9 0.01 115);
    --ring: oklch(0.74 0.17 115);
  }
  .dark {
    --background: oklch(0.15 0.012 130);
    --foreground: oklch(0.94 0.01 110);
    --card: oklch(0.19 0.014 130);
    --primary: oklch(0.88 0.22 115);
    --primary-foreground: oklch(0.2 0.04 125);
    --muted-foreground: oklch(0.68 0.02 120);
    --border: oklch(1 0 0 / 10%);
    --ring: oklch(0.8 0.19 115);
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: 'Geist', sans-serif;
    background: var(--background);
    color: var(--foreground);
    min-height: 100vh;
    padding: 16px;
  }
  .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  h1 { font-size: 20px; font-weight: 600; }
  h1 .accent { color: var(--primary); }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  label { font-size: 13px; font-weight: 500; color: var(--muted-foreground); display: block; margin-bottom: 6px; }
  input[type="text"], input[type="number"] {
    width: 100%;
    font: inherit;
    font-size: 16px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--background);
    color: var(--foreground);
  }
  input:focus-visible, button:focus-visible { outline: 2px solid var(--ring); outline-offset: 1px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    font: inherit;
    font-size: 14px;
    padding: 10px 14px;
    min-height: 44px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--background);
    color: var(--foreground);
    cursor: pointer;
  }
  .chip[aria-pressed="true"] {
    background: var(--primary);
    color: var(--primary-foreground);
    border-color: transparent;
  }
  .chip:active { transform: translateY(1px); }
  #customMinutesWrap { display: none; }
  #customMinutesWrap.visible { display: block; }
  .saved-row { display: none; flex-direction: column; gap: 8px; }
  .saved-row.visible { display: flex; }
  .saved-chip { display: inline-flex; align-items: center; gap: 8px; }
  .saved-chip .x {
    font: inherit;
    border: none;
    background: none;
    color: var(--muted-foreground);
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }
  .summary { font-size: 14px; color: var(--muted-foreground); min-height: 1.4em; }
  #urlOut {
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--background);
    color: var(--foreground);
    word-break: break-all;
    resize: none;
  }
  .disabled-out #urlOut, .disabled-out .summary { opacity: 0.4; }
  .actions { display: flex; gap: 10px; }
  .btn {
    font: inherit;
    font-size: 15px;
    font-weight: 500;
    flex: 1;
    min-height: 44px;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
  }
  .btn:hover { opacity: 0.8; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--primary); color: var(--primary-foreground); }
  .btn-secondary { background: var(--background); color: var(--foreground); border: 1px solid var(--border); }
  .btn-ghost {
    font: inherit;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--foreground);
    padding: 8px 12px;
    min-height: 40px;
    cursor: pointer;
  }
  .btn-ghost:active { transform: translateY(1px); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Fresh <span class="accent">Jobs</span> Link</h1>
    <button class="btn-ghost" id="themeToggle" aria-label="Toggle theme">◐</button>
  </header>

  <div class="card">
    <div>
      <label for="keywords">Keywords</label>
      <input type="text" id="keywords" placeholder="product designer" autocomplete="off">
    </div>
    <div>
      <label for="location">Location (optional)</label>
      <input type="text" id="location" placeholder="Utah" autocomplete="off">
    </div>
    <div>
      <label>Posted within</label>
      <div class="chips" id="windowChips" role="group" aria-label="Time window">
        <button class="chip" data-seconds="900" aria-pressed="false">15 min</button>
        <button class="chip" data-seconds="3600" aria-pressed="true">1 hour</button>
        <button class="chip" data-seconds="86400" aria-pressed="false">24 hours</button>
        <button class="chip" data-seconds="custom" aria-pressed="false">Custom</button>
      </div>
    </div>
    <div id="customMinutesWrap">
      <label for="customMinutes">Minutes</label>
      <input type="number" id="customMinutes" inputmode="numeric" min="1" value="30">
    </div>
    <div>
      <label>Workplace (any if none selected)</label>
      <div class="chips" id="wtChips" role="group" aria-label="Workplace type">
        <button class="chip" data-wt="1" aria-pressed="false">On-site</button>
        <button class="chip" data-wt="2" aria-pressed="false">Remote</button>
        <button class="chip" data-wt="3" aria-pressed="false">Hybrid</button>
      </div>
    </div>
  </div>

  <div class="card saved-row" id="savedRow">
    <label>Saved searches</label>
    <div class="chips" id="savedChips"></div>
    <div class="actions">
      <button class="btn btn-secondary" id="openAllBtn">Open all</button>
      <button class="btn btn-secondary" id="shareBtn">Share chips</button>
    </div>
  </div>

  <div class="card" id="outputCard">
    <div class="summary" id="summary"></div>
    <textarea id="urlOut" rows="3" readonly aria-label="Generated URL"></textarea>
    <div class="actions">
      <button class="btn btn-primary" id="openBtn">Open</button>
      <button class="btn btn-secondary" id="copyBtn">Copy</button>
    </div>
    <button class="btn btn-secondary" id="saveBtn">Save this search</button>
  </div>
</div>

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var keywords = $('keywords'), location_ = $('location'), customMinutes = $('customMinutes');
  var windowChips = $('windowChips'), customWrap = $('customMinutesWrap');
  var urlOut = $('urlOut'), summary = $('summary'), outputCard = $('outputCard');
  var openBtn = $('openBtn'), copyBtn = $('copyBtn'), saveBtn = $('saveBtn');
  var savedRow = $('savedRow'), savedChips = $('savedChips');
  var wtChips = $('wtChips'), openAllBtn = $('openAllBtn'), shareBtn = $('shareBtn');

  // ---- theme ----
  var savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.classList.toggle('dark', savedTheme === 'dark');
  $('themeToggle').addEventListener('click', function () {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  // ---- state ----
  function selectedSeconds() {
    var active = windowChips.querySelector('[aria-pressed="true"]');
    if (active.dataset.seconds === 'custom') {
      var mins = parseInt(customMinutes.value, 10);
      return (mins > 0 ? mins : 30) * 60;
    }
    return parseInt(active.dataset.seconds, 10);
  }

  function windowLabel() {
    var active = windowChips.querySelector('[aria-pressed="true"]');
    if (active.dataset.seconds === 'custom') {
      var mins = parseInt(customMinutes.value, 10) || 30;
      return 'past ' + mins + ' min';
    }
    return 'past ' + active.textContent.trim();
  }

  function selectedWT() {
    return Array.prototype.map.call(
      wtChips.querySelectorAll('[aria-pressed="true"]'),
      function (c) { return c.dataset.wt; }
    );
  }

  function entrySeconds(s) {
    if (s.window === 'custom') {
      var mins = parseInt(s.customMinutes, 10);
      return (mins > 0 ? mins : 30) * 60;
    }
    return parseInt(s.window, 10);
  }

  function buildUrlFrom(s) {
    var url = 'https://www.linkedin.com/jobs/search/?keywords=' + encodeURIComponent(s.keywords);
    if (s.location) url += '&location=' + encodeURIComponent(s.location);
    url += '&f_TPR=r' + s.seconds + '&sortBy=DD';
    if (s.wt && s.wt.length) url += '&f_WT=' + s.wt.join('%2C');
    return url;
  }

  function buildUrl() {
    return buildUrlFrom({
      keywords: keywords.value.trim(),
      location: location_.value.trim(),
      seconds: selectedSeconds(),
      wt: selectedWT()
    });
  }

  function update() {
    var kw = keywords.value.trim(), loc = location_.value.trim();
    var empty = !kw && !loc;
    urlOut.value = buildUrl();
    var parts = [];
    if (kw) parts.push(kw);
    if (loc) parts.push(loc);
    parts.push(windowLabel());
    var wtNames = { '1': 'on-site', '2': 'remote', '3': 'hybrid' };
    var wt = selectedWT();
    if (wt.length) parts.push(wt.map(function (w) { return wtNames[w]; }).join('/'));
    parts.push('newest first');
    summary.textContent = empty ? 'Enter keywords or a location to start' : parts.join(' · ');
    outputCard.classList.toggle('disabled-out', empty);
    openBtn.disabled = empty;
    copyBtn.disabled = empty;
    saveBtn.disabled = empty;
    localStorage.setItem('last', JSON.stringify({
      keywords: kw, location: loc,
      window: windowChips.querySelector('[aria-pressed="true"]').dataset.seconds,
      customMinutes: customMinutes.value,
      wt: selectedWT()
    }));
  }

  // ---- time window chips ----
  windowChips.addEventListener('click', function (e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    windowChips.querySelectorAll('.chip').forEach(function (c) { c.setAttribute('aria-pressed', 'false'); });
    chip.setAttribute('aria-pressed', 'true');
    customWrap.classList.toggle('visible', chip.dataset.seconds === 'custom');
    update();
  });

  // ---- workplace chips (multi-select toggle) ----
  wtChips.addEventListener('click', function (e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    chip.setAttribute('aria-pressed', chip.getAttribute('aria-pressed') === 'true' ? 'false' : 'true');
    update();
  });

  // ---- inputs ----
  [keywords, location_, customMinutes].forEach(function (el) {
    el.addEventListener('input', update);
    el.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !openBtn.disabled) window.open(urlOut.value, '_blank');
    });
  });

  // ---- actions ----
  openBtn.addEventListener('click', function () { window.open(urlOut.value, '_blank'); });

  copyBtn.addEventListener('click', function () {
    function done() {
      copyBtn.textContent = 'Copied';
      setTimeout(function () { copyBtn.textContent = 'Copy'; }, 1500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(urlOut.value).then(done);
    } else {
      urlOut.select();
      document.execCommand('copy');
      done();
    }
  });

  // ---- saved searches ----
  function getSaved() {
    try { return JSON.parse(localStorage.getItem('savedSearches')) || []; }
    catch (e) { return []; }
  }
  function setSaved(list) {
    localStorage.setItem('savedSearches', JSON.stringify(list));
    renderSaved();
  }
  function renderSaved() {
    var list = getSaved();
    savedRow.classList.toggle('visible', list.length > 0);
    savedChips.innerHTML = '';
    list.forEach(function (s, i) {
      var chip = document.createElement('span');
      chip.className = 'chip saved-chip';
      var label = document.createElement('button');
      label.className = 'x';
      label.style.color = 'inherit';
      label.textContent = s.keywords + (s.location ? ' · ' + s.location : '');
      label.addEventListener('click', function () { applySaved(s); });
      var del = document.createElement('button');
      del.className = 'x';
      del.setAttribute('aria-label', 'Delete saved search');
      del.textContent = '✕';
      del.addEventListener('click', function () {
        var l = getSaved(); l.splice(i, 1); setSaved(l);
      });
      chip.appendChild(label);
      chip.appendChild(del);
      savedChips.appendChild(chip);
    });
  }
  function applySaved(s) {
    keywords.value = s.keywords;
    location_.value = s.location;
    setWindow(s.window, s.customMinutes);
    setWT(s.wt || []);
    update();
  }
  saveBtn.addEventListener('click', function () {
    var list = getSaved();
    var entry = {
      keywords: keywords.value.trim(),
      location: location_.value.trim(),
      window: windowChips.querySelector('[aria-pressed="true"]').dataset.seconds,
      customMinutes: customMinutes.value,
      wt: selectedWT()
    };
    var dup = list.some(function (s) {
      return s.keywords === entry.keywords && s.location === entry.location &&
        s.window === entry.window && (s.wt || []).join() === entry.wt.join();
    });
    if (!dup) { list.push(entry); setSaved(list); }
    saveBtn.textContent = dup ? 'Already saved' : 'Saved';
    setTimeout(function () { saveBtn.textContent = 'Save this search'; }, 1500);
  });

  function setWindow(win, mins) {
    windowChips.querySelectorAll('.chip').forEach(function (c) {
      c.setAttribute('aria-pressed', c.dataset.seconds === win ? 'true' : 'false');
    });
    var isCustom = win === 'custom';
    customWrap.classList.toggle('visible', isCustom);
    if (isCustom && mins) customMinutes.value = mins;
  }

  function setWT(list) {
    wtChips.querySelectorAll('.chip').forEach(function (c) {
      c.setAttribute('aria-pressed', list.indexOf(c.dataset.wt) !== -1 ? 'true' : 'false');
    });
  }

  // ---- open all saved searches ----
  openAllBtn.addEventListener('click', function () {
    getSaved().forEach(function (s) {
      window.open(buildUrlFrom({
        keywords: s.keywords, location: s.location,
        seconds: entrySeconds(s), wt: s.wt
      }), '_blank');
    });
  });

  // ---- share chips via link ----
  shareBtn.addEventListener('click', function () {
    var link = location.origin + location.pathname + '#import=' + encodeURIComponent(JSON.stringify(getSaved()));
    function done() {
      shareBtn.textContent = 'Link copied';
      setTimeout(function () { shareBtn.textContent = 'Share chips'; }, 1500);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(done);
    } else { done(); }
  });

  // ---- import chips from a share link ----
  var importMatch = location.hash.match(/^#import=(.+)/);
  if (importMatch) {
    try {
      var incoming = JSON.parse(decodeURIComponent(importMatch[1]));
      var current = getSaved();
      incoming.forEach(function (s) {
        var dup = current.some(function (x) {
          return x.keywords === s.keywords && x.location === s.location &&
            x.window === s.window && (x.wt || []).join() === (s.wt || []).join();
        });
        if (!dup) current.push(s);
      });
      setSaved(current);
    } catch (e) { /* malformed link, ignore */ }
    history.replaceState(null, '', location.pathname);
  }

  // ---- restore last-used ----
  try {
    var last = JSON.parse(localStorage.getItem('last'));
    if (last) {
      keywords.value = last.keywords || '';
      location_.value = last.location || '';
      if (last.window) setWindow(last.window, last.customMinutes);
      setWT(last.wt || []);
    }
  } catch (e) { /* fresh start */ }

  // desktop-only autofocus (mobile keyboard popping up unprompted is annoying)
  if (!('ontouchstart' in window)) keywords.focus();

  renderSaved();
  update();
})();
</script>
</body>
</html>
